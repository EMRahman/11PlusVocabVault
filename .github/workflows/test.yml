name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No dependencies to install: the app is zero-build and the tests use
      # Node's built-in test runner.
      - name: Run unit / characterization tests
        run: node --test
