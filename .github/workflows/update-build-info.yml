name: Update Build Info

on:
  push:
    branches: [main]
    paths-ignore:
      - 'build-info.js'

jobs:
  update-build-info:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build info
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d')
          BUILD_TIME=$(date -u '+%H:%M UTC')
          BUILD_ISO=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          BUILD_VER=$(date -u '+%Y%m%d%H%M')
          cat > build-info.js << JSEOF
          const BUILD_INFO = {
            date: '${BUILD_DATE}',
            time: '${BUILD_TIME}',
            iso: '${BUILD_ISO}'
          };
          JSEOF
          sed -i "s/?v=[^\"']*/?v=${BUILD_VER}/g" index.html
          # Also cache-bust intra-repo ES module imports: static import specifiers
          # live inside the .js files, so the index.html sed above does not reach them.
          # Stamp relative specifiers ending in .js (e.g. from './store/state.js').
          find js -name '*.js' -type f -print0 | xargs -0 sed -i -E "s#(from[[:space:]]+['\"])(\.[^'\"?]+\.js)(\?v=[^'\"]*)?(['\"])#\1\2?v=${BUILD_VER}\4#g"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-info.js index.html js
          git diff --staged --quiet || git commit -m "chore: update build info [skip ci]"
          git push
